<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2인 포즈 추적 검증 v0.2 — 몸으로 한글</title>
<style>
  :root{
    --bg:#0E1420;
    --panel:#18202E;
    --line:#2A3547;
    --ink:#E8EDF4;
    --ink-soft:#8A98AC;
    --p1:#FF6B4A;   /* 아빠 = 주황 */
    --p2:#3DD6C4;   /* 아이 = 청록 */
    --good:#4ADE80;
    --warn:#FBBF24;
    --bad:#F87171;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;
    overflow:hidden;
  }

  header{
    padding:8px 14px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;
    background:var(--panel);flex-wrap:wrap;
  }
  header h1{font-size:.9rem;font-weight:700}
  header .ver{font-family:var(--mono);font-size:.66rem;color:var(--ink-soft)}
  .spacer{flex:1}
  .ctrl-btn{
    font:inherit;font-size:.8rem;font-weight:600;cursor:pointer;
    background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:7px;
    padding:7px 13px;
  }
  .ctrl-btn:active{background:var(--line)}
  .toggle-on{background:var(--p2)!important;color:#0E1420!important;border-color:var(--p2)!important}

  #stage{flex:1;position:relative;background:#000;overflow:hidden}
  video{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  canvas{position:absolute;width:100%;height:100%;transform:scaleX(-1)}

  /* 나란히 서기 가이드 */
  #zoneGuide{position:absolute;inset:0;display:flex;pointer-events:none;opacity:.4}
  #zoneGuide .zone{flex:1}
  #zoneGuide .zone:first-child{border-right:3px dashed rgba(255,255,255,.3)}

  /* ▼ 원거리 가독용 대형 계측 패널 (화면 하단 오버레이) */
  #hud{
    position:absolute;left:0;right:0;bottom:0;
    background:linear-gradient(transparent, rgba(14,20,32,.82) 22%, rgba(14,20,32,.92));
    padding:20px 24px 22px;
    display:flex;gap:26px;align-items:flex-end;justify-content:center;flex-wrap:wrap;
    pointer-events:none;
  }
  .hud-item{text-align:center;line-height:1}
  .hud-label{font-size:1.1rem;color:var(--ink-soft);font-weight:600;margin-bottom:6px}
  .hud-val{font-family:var(--mono);font-weight:800;font-size:4.2rem;letter-spacing:-.02em}
  .hud-sub{font-size:.95rem;color:var(--ink-soft);margin-top:2px}
  @media (max-width:820px){ .hud-val{font-size:3rem} .hud-label{font-size:.9rem} #hud{gap:16px} }

  .v-good{color:var(--good)} .v-warn{color:var(--warn)} .v-bad{color:var(--bad)}
  .v-p1{color:var(--p1)} .v-p2{color:var(--p2)}

  /* 시작/카운트다운 오버레이 */
  #startCover{position:absolute;inset:0;background:rgba(14,20,32,.94);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;text-align:center;padding:22px;z-index:5}
  #startCover h2{font-size:1.15rem;font-weight:800}
  #startCover p{color:var(--ink-soft);font-size:.88rem;line-height:1.7;max-width:460px}
  #startCover ol{text-align:left;color:var(--ink-soft);font-size:.84rem;line-height:1.85;max-width:460px;padding-left:20px}
  .big-btn{font:inherit;font-size:1.05rem;font-weight:700;cursor:pointer;background:var(--p1);color:#0E1420;
    border:none;border-radius:12px;padding:16px 44px}
  .big-btn:active{transform:scale(.97)}
  .big-btn.alt{background:var(--p2)}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  #errBox{color:var(--bad);font-size:.84rem;max-width:460px;line-height:1.6;display:none;
    background:rgba(248,113,113,.1);border:1px solid var(--bad);border-radius:8px;padding:12px}

  /* 카운트다운 대형 숫자 */
  #countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    z-index:6;pointer-events:none}
  #countdown span{font-family:var(--mono);font-weight:800;font-size:30vh;color:var(--p1);
    text-shadow:0 0 40px rgba(0,0,0,.7)}
</style>
</head>
<body>

<header>
  <h1>2인 포즈 추적 검증</h1>
  <span class="ver">proto_v0.2</span>
  <div class="spacer"></div>
  <button class="ctrl-btn toggle-on" id="voiceBtn">🔊 음성 켜짐</button>
  <button class="ctrl-btn" id="resetBtn">계측 초기화</button>
</header>

<div id="stage">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="zoneGuide"><div class="zone"></div><div class="zone"></div></div>

  <!-- 대형 계측 패널 -->
  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">FPS</div>
      <div class="hud-val" id="fps">–</div>
      <div class="hud-sub">최저 <span id="minFps">–</span></div>
    </div>
    <div class="hud-item">
      <div class="hud-label">아빠</div>
      <div class="hud-val v-p1" id="p1stat">–</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">아이</div>
      <div class="hud-val v-p2" id="p2stat">–</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">2인 유지율</div>
      <div class="hud-val" id="dualRate">–</div>
      <div class="hud-sub">겹침 <span id="overlapV">–</span></div>
    </div>
  </div>

  <div id="countdown"><span id="cdNum">5</span></div>

  <div id="startCover">
    <h2>👨‍👧 두 사람 나란히 서기 검증 v0.2</h2>
    <p>계측 글자를 크게 키우고 <b>음성 안내</b>를 넣었어요. 멀리서도 화면 아래 큰 숫자가 보이고, 한 명을 놓치면 소리로 알려줍니다.</p>
    <ol>
      <li>아이패드를 세워 두 사람 전신이 다 보이게 두세요</li>
      <li>화면 <b>왼쪽 아빠, 오른쪽 아이</b>, 겹치지 말고 나란히</li>
      <li>"5초 후 시작"을 누르면 카운트다운 뒤 계측이 시작돼요 — 그 사이 제자리로</li>
    </ol>
    <div class="btn-row">
      <button class="big-btn" id="startBtn">바로 시작</button>
      <button class="big-btn alt" id="startDelayBtn">5초 후 시작</button>
    </div>
    <div id="errBox"></div>
  </div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video=document.getElementById("video"), canvas=document.getElementById("canvas"), ctx=canvas.getContext("2d");
const startCover=document.getElementById("startCover"), errBox=document.getElementById("errBox");
const el={fps:document.getElementById("fps"),minFps:document.getElementById("minFps"),
  p1:document.getElementById("p1stat"),p2:document.getElementById("p2stat"),
  dual:document.getElementById("dualRate"),overlap:document.getElementById("overlapV")};

let landmarker=null, running=false, lastVideoTime=-1;
let fpsSamples=[], minFpsSeen=Infinity, framesTotal=0, framesDual=0;
let voiceOn=true, lastSpokenState="", lastSpeakAt=0;

const CONNECTIONS=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],
  [23,25],[25,27],[24,26],[26,28],[27,29],[29,31],[28,30],[30,32],[0,11],[0,12]];
const COLORS=["#FF6B4A","#3DD6C4"];

/* ── 음성 안내 ── */
function speak(text){
  if(!voiceOn) return;
  const now=performance.now();
  if(now-lastSpeakAt < 1200) return;        // 너무 잦은 발화 방지
  lastSpeakAt=now;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ko-KR"; u.rate=1.05;
    speechSynthesis.speak(u);
  }catch(e){}
}
function announceState(n){
  let s = n>=2 ? "dual" : n===1 ? "one" : "none";
  if(s===lastSpokenState) return;
  lastSpokenState=s;
  if(s==="dual") speak("두 명 인식");
  else if(s==="one") speak("한 명 놓침");
  else speak("아무도 없음");
}

function showError(m){errBox.style.display="block";errBox.innerHTML=m;}

async function init(delay){
  errBox.style.display="none";
  document.getElementById("startBtn").disabled=true;
  document.getElementById("startDelayBtn").disabled=true;

  let stream;
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"user",width:{ideal:1280},height:{ideal:720}},audio:false});
  }catch(e){
    showError("카메라를 켤 수 없습니다.<br>· https 주소인지 확인 (file://는 iOS 불가)<br>· 사파리 카메라 권한 확인<br><br>"+e.message);
    document.getElementById("startBtn").disabled=false;
    document.getElementById("startDelayBtn").disabled=false;
    return;
  }
  video.srcObject=stream;
  await new Promise(r=>{video.onloadedmetadata=()=>{video.play();r();};});

  try{
    const vision=await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    landmarker=await PoseLandmarker.createFromOptions(vision,{
      baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",delegate:"GPU"},
      runningMode:"VIDEO",numPoses:2,
      minPoseDetectionConfidence:0.4,minPosePresenceConfidence:0.4,minTrackingConfidence:0.4});
  }catch(e){
    showError("AI 모델 로드 실패. 새로고침 해주세요.<br><br>"+e.message);
    return;
  }

  // 음성 엔진 워밍업 (iOS는 사용자 제스처 내에서 첫 호출 필요)
  try{ speechSynthesis.speak(new SpeechSynthesisUtterance("")); }catch(e){}

  startCover.style.display="none";

  if(delay){
    await countdown(5);
    resetMetrics();      // 카운트다운 동안 값 오염 제거
  }
  running=true;
  requestAnimationFrame(loop);
}

function countdown(sec){
  return new Promise(res=>{
    const box=document.getElementById("countdown"), num=document.getElementById("cdNum");
    box.style.display="flex";
    let n=sec; num.textContent=n; speak(n+"");
    const t=setInterval(()=>{
      n--;
      if(n<=0){clearInterval(t);box.style.display="none";speak("시작");res();}
      else{num.textContent=n;speak(n+"");}
    },1000);
  });
}

function resizeCanvas(){canvas.width=video.videoWidth;canvas.height=video.videoHeight;}
let lastFrameStamp=performance.now();

function loop(){
  if(!running)return;
  if(video.videoWidth&&canvas.width!==video.videoWidth)resizeCanvas();
  const now=performance.now();
  if(video.currentTime!==lastVideoTime&&landmarker){
    lastVideoTime=video.currentTime;
    const result=landmarker.detectForVideo(video,now);
    draw(result);measure(result,now);
  }
  requestAnimationFrame(loop);
}

function draw(result){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const people=result.landmarks||[];
  people.forEach((lm,idx)=>{
    const color=COLORS[idx%2];
    ctx.strokeStyle=color;ctx.lineWidth=5;
    CONNECTIONS.forEach(([a,b])=>{if(lm[a]&&lm[b]){
      ctx.beginPath();
      ctx.moveTo(lm[a].x*canvas.width,lm[a].y*canvas.height);
      ctx.lineTo(lm[b].x*canvas.width,lm[b].y*canvas.height);ctx.stroke();}});
    ctx.fillStyle=color;
    lm.forEach(p=>{ctx.beginPath();ctx.arc(p.x*canvas.width,p.y*canvas.height,6,0,Math.PI*2);ctx.fill();});
    // 머리 위 대형 라벨 (거울 반전 보정: 텍스트만 다시 뒤집어 그림)
    if(lm[0]){
      const hx=lm[0].x*canvas.width, hy=lm[0].y*canvas.height-40;
      ctx.save();
      ctx.translate(hx,hy); ctx.scale(-1,1);   // 화면 전체가 scaleX(-1)이므로 글자 보정
      ctx.font="800 46px -apple-system,sans-serif";
      ctx.textAlign="center";
      ctx.fillStyle=color;
      ctx.strokeStyle="rgba(0,0,0,.6)"; ctx.lineWidth=6;
      const tag = idx===0? "아빠 OK":"아이 OK";
      ctx.strokeText(tag,0,0); ctx.fillText(tag,0,0);
      ctx.restore();
    }
  });
}

function overlapRatio(people){
  if(people.length<2)return null;
  const xr=lm=>{const xs=[11,12,23,24].map(i=>lm[i]?lm[i].x:null).filter(v=>v!==null);
    return xs.length<2?null:[Math.min(...xs),Math.max(...xs)];};
  const a=xr(people[0]),b=xr(people[1]);if(!a||!b)return null;
  const inter=Math.max(0,Math.min(a[1],b[1])-Math.max(a[0],b[0]));
  const union=Math.max(a[1],b[1])-Math.min(a[0],b[0]);
  return union>0?inter/union:0;
}

function measure(result,now){
  const people=result.landmarks||[], n=people.length;
  const dt=now-lastFrameStamp; lastFrameStamp=now;
  fpsSamples.push(1000/dt); if(fpsSamples.length>30)fpsSamples.shift();
  const avg=fpsSamples.reduce((s,v)=>s+v,0)/fpsSamples.length;
  framesTotal++; if(n>=2)framesDual++;
  if(framesTotal>15&&avg<minFpsSeen)minFpsSeen=avg;

  el.fps.textContent=avg.toFixed(0);
  el.fps.className="hud-val "+(avg>=20?"v-good":avg>=15?"v-warn":"v-bad");
  el.minFps.textContent=minFpsSeen===Infinity?"–":minFpsSeen.toFixed(0);
  el.minFps.className=minFpsSeen>=15?"v-good":minFpsSeen>=12?"v-warn":"v-bad";
  el.p1.textContent=people[0]?"OK":"✕"; el.p1.className="hud-val "+(people[0]?"v-p1":"v-bad");
  el.p2.textContent=people[1]?"OK":"✕"; el.p2.className="hud-val "+(people[1]?"v-p2":"v-bad");

  const ov=overlapRatio(people);
  if(ov!==null){el.overlap.textContent=(ov*100).toFixed(0)+"%";
    el.overlap.className=ov<0.15?"v-good":ov<0.4?"v-warn":"v-bad";}
  const rate=framesTotal?framesDual/framesTotal*100:0;
  el.dual.textContent=rate.toFixed(0)+"%";
  el.dual.className="hud-val "+(rate>=80?"v-good":rate>=50?"v-warn":"v-bad");

  announceState(n);
}

function resetMetrics(){fpsSamples=[];minFpsSeen=Infinity;framesTotal=0;framesDual=0;lastSpokenState="";}

document.getElementById("resetBtn").addEventListener("click",resetMetrics);
document.getElementById("voiceBtn").addEventListener("click",function(){
  voiceOn=!voiceOn;
  this.textContent=voiceOn?"🔊 음성 켜짐":"🔇 음성 꺼짐";
  this.classList.toggle("toggle-on",voiceOn);
});
document.getElementById("startBtn").addEventListener("click",()=>init(false));
document.getElementById("startDelayBtn").addEventListener("click",()=>init(true));
</script>
</body>
</html>
