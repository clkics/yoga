<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>몸으로 한글 — 놀이</title>
<style>
  :root{
    --sky:#FFF4D6;         /* 따뜻한 크림-노랑 배경 */
    --sky2:#FFE8B0;
    --ink:#3A2E2A;
    --ink-soft:#8A7A6E;
    --coral:#FF7A59;       /* 아빠/주 액센트 */
    --mint:#37C9A8;        /* 아이/성공 */
    --grape:#7B6CF6;       /* 포인트 */
    --sun:#FFC93C;         /* 별/보상 */
    --paper:#FFFFFF;
    --line:#F0E3C8;
    --shadow:0 8px 0 rgba(58,46,42,.12);
    --round:22px;
    --display:"Jua","Gaegu",-apple-system,sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:var(--display);color:var(--ink);
    background:linear-gradient(170deg,var(--sky) 0%,var(--sky2) 100%);
    display:flex;align-items:center;justify-content:center;
  }
  #app{width:100%;height:100%;max-width:960px;position:relative}

  button{font-family:var(--display);cursor:pointer;border:none;background:none}

  /* ══ 공통 화면 전환 ══ */
  .screen{position:absolute;inset:0;display:none;flex-direction:column}
  .screen.active{display:flex}

  /* ══ 타이틀 ══ */
  #titleScreen{align-items:center;justify-content:center;gap:26px;padding:24px;text-align:center}
  .logo-body{font-size:clamp(2.6rem,9vw,4.4rem);color:var(--coral);line-height:1;
    text-shadow:3px 3px 0 #fff, 6px 6px 0 rgba(255,122,89,.25)}
  .logo-sub{font-size:1.05rem;color:var(--ink-soft);margin-top:-6px}
  .mascot{font-size:5rem;animation:bob 2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
  .start-btns{display:flex;flex-direction:column;gap:14px;width:min(340px,80vw)}
  .big-start{
    font-size:1.5rem;color:#fff;padding:18px;border-radius:var(--round);
    box-shadow:var(--shadow);transition:transform .12s;
  }
  .big-start:active{transform:translateY(3px);box-shadow:0 4px 0 rgba(58,46,42,.12)}
  .bs-solo{background:var(--mint)}
  .bs-duo{background:var(--coral)}
  .note{font-size:.82rem;color:var(--ink-soft);line-height:1.6;max-width:360px}

  /* ══ 정복지도(스테이지 선택) ══ */
  #mapScreen{padding:18px}
  .map-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .icon-btn{width:44px;height:44px;border-radius:14px;background:var(--paper);
    box-shadow:var(--shadow);font-size:1.3rem;display:flex;align-items:center;justify-content:center;color:var(--ink)}
  .map-title{font-size:1.3rem;color:var(--ink)}
  .star-count{margin-left:auto;background:var(--paper);border-radius:14px;padding:8px 16px;
    box-shadow:var(--shadow);font-size:1.1rem;color:var(--sun)}
  .star-count b{color:var(--ink)}
  .map-scroll{flex:1;overflow-y:auto;padding:6px 2px 20px}
  .stage-group{margin-bottom:18px}
  .stage-label{font-size:1rem;color:var(--ink-soft);margin:0 0 10px 4px;display:flex;align-items:center;gap:8px}
  .stage-label .badge{background:var(--grape);color:#fff;font-size:.72rem;padding:2px 10px;border-radius:999px}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:12px}
  .tile{
    aspect-ratio:1;border-radius:18px;background:var(--paper);box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;
    font-size:2.1rem;color:var(--ink);transition:transform .12s;
  }
  .tile:active{transform:scale(.94)}
  .tile.duo{background:linear-gradient(145deg,#fff 60%,#FFE0D6)}
  .tile .ministar{position:absolute;bottom:5px;font-size:.72rem;color:var(--sun);letter-spacing:-2px}
  .tile.locked{opacity:.4;filter:grayscale(.6)}
  .tile.locked::after{content:"🔒";position:absolute;font-size:1.1rem;bottom:5px;right:7px}
  .tile.cleared{outline:3px solid var(--mint);outline-offset:-3px}

  /* ══ 게임 플레이 ══ */
  #playScreen{background:#1a1420}
  #camWrap{position:absolute;inset:0;overflow:hidden}
  video{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  #poseCanvas{position:absolute;width:100%;height:100%;transform:scaleX(-1)}

  /* 상단 바 */
  #playTop{position:absolute;top:0;left:0;right:0;padding:12px 16px;z-index:6;
    display:flex;align-items:center;gap:10px;
    background:linear-gradient(180deg,rgba(26,20,32,.6),transparent)}
  #playTop .icon-btn{background:rgba(255,255,255,.9)}
  #targetGlyph{font-size:2.6rem;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.4);min-width:50px;text-align:center}
  #playHint{color:#fff;font-size:1.05rem;text-shadow:1px 1px 3px rgba(0,0,0,.6);flex:1;line-height:1.3}
  #comboBox{background:rgba(255,201,60,.95);color:var(--ink);border-radius:14px;padding:6px 12px;
    font-size:.95rem;display:none}

  /* 시범 애니메이션 오버레이 */
  #demoOverlay{position:absolute;inset:0;z-index:7;background:rgba(26,20,32,.82);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  #demoCanvas{width:min(70vw,340px);height:auto;background:rgba(255,255,255,.06);border-radius:24px}
  #demoText{color:#fff;font-size:1.3rem;text-align:center;padding:0 20px;line-height:1.4}
  #demoSpeak{font-size:3rem;color:var(--sun);min-height:3.4rem}
  #demoBtn{margin-top:6px;background:var(--mint);color:#fff;font-size:1.2rem;padding:14px 36px;
    border-radius:var(--round);box-shadow:var(--shadow)}

  /* 근접도 게이지 */
  #gaugeWrap{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);z-index:6;
    width:min(74vw,320px);display:none}
  #gaugeTrack{height:22px;background:rgba(255,255,255,.25);border-radius:999px;overflow:hidden;
    border:2px solid rgba(255,255,255,.5)}
  #gaugeFill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--coral),var(--mint));
    transition:width .12s}
  #gaugeLabel{text-align:center;color:#fff;font-size:.95rem;margin-top:6px;text-shadow:1px 1px 2px rgba(0,0,0,.6)}

  /* 하단 조작 */
  #playBottom{position:absolute;bottom:0;left:0;right:0;padding:16px;z-index:6;
    display:flex;gap:12px;justify-content:center;
    background:linear-gradient(0deg,rgba(26,20,32,.6),transparent)}
  .play-btn{background:rgba(255,255,255,.92);color:var(--ink);font-size:1.05rem;
    padding:13px 22px;border-radius:16px;box-shadow:var(--shadow)}
  .play-btn.primary{background:var(--sun)}

  /* 상태 안내 (사람 감지 등) */
  #statusChip{position:absolute;top:70px;left:50%;transform:translateX(-50%);z-index:6;
    background:rgba(0,0,0,.55);color:#fff;padding:8px 18px;border-radius:999px;font-size:.9rem;display:none}

  /* ══ 성공 이펙트 ══ */
  #winOverlay{position:absolute;inset:0;z-index:9;display:none;align-items:center;justify-content:center;
    flex-direction:column;gap:10px;background:rgba(26,20,32,.5);backdrop-filter:blur(2px)}
  #winGlyph{font-size:9rem;color:#fff;text-shadow:0 0 30px var(--sun),4px 4px 0 var(--coral);
    animation:pop .5s cubic-bezier(.2,1.6,.4,1)}
  @keyframes pop{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0)}}
  #winSpeak{font-size:2.4rem;color:var(--sun)}
  #winStars{font-size:2.6rem;letter-spacing:6px}
  #winStars span{display:inline-block;animation:starPop .4s backwards}
  @keyframes starPop{0%{transform:scale(0) translateY(20px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
  #winRecord{color:#fff;font-size:1.2rem;background:rgba(255,122,89,.9);padding:8px 20px;border-radius:999px;display:none}
  #winNext{margin-top:14px;background:var(--mint);color:#fff;font-size:1.4rem;padding:16px 44px;
    border-radius:var(--round);box-shadow:var(--shadow)}
  .confetti{position:absolute;top:-20px;font-size:1.6rem;pointer-events:none;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.2}}

  /* 로딩 */
  #loading{position:absolute;inset:0;z-index:20;background:var(--sky);display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:18px}
  #loading .mascot{font-size:4rem}
  #loadingText{font-size:1.2rem;color:var(--ink-soft)}
  #errText{color:var(--coral);font-size:.95rem;max-width:80vw;text-align:center;line-height:1.6;display:none}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">

  <!-- 타이틀 -->
  <section class="screen active" id="titleScreen">
    <div class="mascot">🧍</div>
    <div>
      <div class="logo-body">몸으로 한글</div>
      <div class="logo-sub">내 몸으로 글자를 만들어요</div>
    </div>
    <div class="start-btns">
      <button class="big-start bs-solo" data-mode="solo">🧒 혼자 하기</button>
      <button class="big-start bs-duo" data-mode="duo">👨‍👧 아빠랑 하기</button>
    </div>
    <p class="note">카메라로 몸동작을 봐요. 사진은 저장되지 않고 이 기기 안에서만 쓰여요.<br>넓은 곳에서 온몸이 보이게 서주세요.</p>
  </section>

  <!-- 정복지도 -->
  <section class="screen" id="mapScreen">
    <div class="map-head">
      <button class="icon-btn" id="mapBack">←</button>
      <div class="map-title">글자 지도</div>
      <div class="star-count">⭐ <b id="totalStars">0</b></div>
    </div>
    <div class="map-scroll" id="mapScroll"></div>
  </section>

  <!-- 게임 -->
  <section class="screen" id="playScreen">
    <div id="camWrap">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="poseCanvas"></canvas>
    </div>

    <div id="playTop">
      <button class="icon-btn" id="playBack">←</button>
      <div id="targetGlyph">ㅏ</div>
      <div id="playHint">몸으로 만들어봐요!</div>
      <div id="comboBox">🔥 <span id="comboNum">0</span></div>
    </div>

    <div id="statusChip"></div>

    <div id="gaugeWrap">
      <div id="gaugeTrack"><div id="gaugeFill"></div></div>
      <div id="gaugeLabel">비슷해지고 있어요…</div>
    </div>

    <div id="playBottom">
      <button class="play-btn" id="demoAgainBtn">👀 다시 보기</button>
      <button class="play-btn primary" id="skipBtn">건너뛰기</button>
    </div>

    <!-- 시범 -->
    <div id="demoOverlay">
      <div id="demoSpeak">아</div>
      <canvas id="demoCanvas" width="340" height="360"></canvas>
      <div id="demoText">이렇게 만들어요!</div>
      <button id="demoBtn">해볼래요! →</button>
    </div>

    <!-- 성공 -->
    <div id="winOverlay">
      <div id="winGlyph">ㅏ</div>
      <div id="winSpeak">아</div>
      <div id="winStars"></div>
      <div id="winRecord"></div>
      <button id="winNext">다음 →</button>
    </div>
  </section>

  <!-- 로딩 -->
  <div id="loading">
    <div class="mascot">🧍</div>
    <div id="loadingText">카메라 준비 중…</div>
    <div id="errText"></div>
  </div>

</div>

<script type="module">
import { PoseLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

/* ══════════════════════════════════════════
   1. 자모 데이터 (확정 프리셋 v5 기반)
   각 글자: 발음, 모드(solo/duo), 목표 관절각, 시범 캡션
   판정은 '관절 각도'만 사용 → 몸집 무관
   ══════════════════════════════════════════ */

// 각도 규약(시범 렌더): 팔다리=아래 0°,오른쪽+90°,위180° / 몸통·머리=위 0°
const BASE_FIG={rootH:92,torso:0,head:0,headUp:0,aL:[-7,-7],aR:[7,7],lL:[-4,-4],lR:[4,4],rot:0};

// 판정용 목표각 정의 헬퍼: 어깨-팔 벌림각(몸통 기준), 팔꿈치 굽힘, 다리 벌림 등 핵심만 검사
// checks: [{joint, target, tol}] — joint 계산은 evaluatePose에서
const LETTERS={
 // ─ S1 솔로 단모음 ─
 "ㅣ":{sound:"이",mode:"solo",fig:{...BASE_FIG},
   cap:"차렷! 곧게 서요",
   checks:[{k:"armL",t:0,tol:28},{k:"armR",t:0,tol:28},{k:"legGap",t:12,tol:16}]},
 "ㅏ":{sound:"아",mode:"solo",fig:{rootH:92,torso:0,head:0,aL:[-7,-7],aR:[90,90],lL:[-4,-4],lR:[4,4]},
   cap:"오른팔을 옆으로!",
   checks:[{k:"armR",t:90,tol:32},{k:"armL",t:0,tol:32}]},
 "ㅓ":{sound:"어",mode:"solo",fig:{rootH:92,torso:0,head:0,aL:[-90,-90],aR:[7,7],lL:[-4,-4],lR:[4,4]},
   cap:"왼팔을 옆으로!",
   checks:[{k:"armL",t:90,tol:32},{k:"armR",t:0,tol:32}]},
 "ㅡ":{sound:"으",mode:"solo",fig:{...BASE_FIG,rot:-88},
   cap:"바닥에 누워요",
   checks:[{k:"lie",t:1,tol:0}]},
 // ─ S2 솔로 자음 ─
 "ㅅ":{sound:"스",mode:"solo",fig:{rootH:88,torso:0,head:0,aL:[-12,-12],aR:[12,12],lL:[-25,-25],lR:[25,25]},
   cap:"다리를 쫙 벌려요",
   checks:[{k:"legGap",t:52,tol:22},{k:"armL",t:12,tol:30},{k:"armR",t:12,tol:30}]},
 "ㄱ":{sound:"그",mode:"solo",fig:{rootH:92,torso:88,head:8,aL:[90,90],aR:[94,94],lL:[-3,-3],lR:[3,3]},
   cap:"허리를 앞으로 숙여요",
   checks:[{k:"bend",t:1,tol:0}]},
 "ㄴ":{sound:"느",mode:"solo",fig:{rootH:16,torso:0,head:0,aL:[-8,-8],aR:[8,8],lL:[82,82],lR:[86,86]},
   cap:"앉아서 다리를 앞으로",
   checks:[{k:"sit",t:1,tol:0}]},
 "ㅇ":{sound:"으",mode:"solo",fig:{rootH:78,torso:0,head:0,aL:[-24,-6],aR:[24,6],lL:[-24,16],lR:[24,-16]},
   cap:"팔로 동그라미!",
   checks:[{k:"armRound",t:1,tol:0}]},
 // ─ S3 듀오 글자 (아빠+아이) ─
 "가":{sound:"가",mode:"duo",
   figs:[{who:"아빠",fig:{rootH:92,torso:88,head:8,aL:[90,90],aR:[94,94],lL:[-3,-3],lR:[3,3]},x:-80,c:"coral"},
         {who:"아이",fig:{rootH:92,torso:0,head:0,aL:[-7,-7],aR:[90,90],lL:[-4,-4],lR:[4,4]},x:80,c:"mint"}],
   cap:"아빠는 ㄱ, 아이는 ㅏ!",
   duoChecks:{p0:[{k:"bend",t:1,tol:0}],p1:[{k:"armR",t:90,tol:36}]}},
 "나":{sound:"나",mode:"duo",
   figs:[{who:"아빠",fig:{rootH:16,torso:0,head:0,aL:[-8,-8],aR:[8,8],lL:[82,82],lR:[86,86]},x:-80,c:"coral"},
         {who:"아이",fig:{rootH:92,torso:0,head:0,aL:[-7,-7],aR:[90,90],lL:[-4,-4],lR:[4,4]},x:80,c:"mint"}],
   cap:"아빠는 ㄴ, 아이는 ㅏ!",
   duoChecks:{p0:[{k:"sit",t:1,tol:0}],p1:[{k:"armR",t:90,tol:36}]}},
 "사":{sound:"사",mode:"duo",
   figs:[{who:"아빠",fig:{rootH:88,torso:0,head:0,aL:[-12,-12],aR:[12,12],lL:[-25,-25],lR:[25,25]},x:-80,c:"coral"},
         {who:"아이",fig:{rootH:92,torso:0,head:0,aL:[-7,-7],aR:[90,90],lL:[-4,-4],lR:[4,4]},x:80,c:"mint"}],
   cap:"아빠는 ㅅ, 아이는 ㅏ!",
   duoChecks:{p0:[{k:"legGap",t:52,tol:24}],p1:[{k:"armR",t:90,tol:36}]}},
 "아":{sound:"아",mode:"duo",
   figs:[{who:"아빠",fig:{rootH:78,torso:0,head:0,aL:[-24,-6],aR:[24,6],lL:[-24,16],lR:[24,-16]},x:-80,c:"coral"},
         {who:"아이",fig:{rootH:92,torso:0,head:0,aL:[-7,-7],aR:[90,90],lL:[-4,-4],lR:[4,4]},x:80,c:"mint"}],
   cap:"아빠는 ㅇ, 아이는 ㅏ!",
   duoChecks:{p0:[{k:"armRound",t:1,tol:0}],p1:[{k:"armR",t:90,tol:36}]}},
};

const STAGES=[
 {id:"S1",label:"혼자 단모음",badge:"1단계",mode:"solo",list:["ㅣ","ㅏ","ㅓ","ㅡ"]},
 {id:"S2",label:"혼자 자음",badge:"2단계",mode:"solo",list:["ㅅ","ㄱ","ㄴ","ㅇ"]},
 {id:"S3",label:"아빠랑 글자",badge:"3단계",mode:"duo",list:["가","나","사","아"]},
];

/* ══════════════════════════════════════════
   2. 저장 (별/기록) — localStorage 불가 환경 대비 메모리 폴백
   ══════════════════════════════════════════ */
const store={
  data:{stars:{},best:{combo:0}},
  load(){ try{const r=localStorage.getItem("hangul_body");if(r)this.data=JSON.parse(r);}catch(e){} },
  save(){ try{localStorage.setItem("hangul_body",JSON.stringify(this.data));}catch(e){} },
  starOf(g){return this.data.stars[g]||0;},
  setStar(g,n){if(n>(this.data.stars[g]||0)){this.data.stars[g]=n;this.save();}},
  total(){return Object.values(this.data.stars).reduce((s,v)=>s+v,0);},
};
store.load();

/* ══════════════════════════════════════════
   3. 음성
   ══════════════════════════════════════════ */
function speak(text,rate=1){
  try{ speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.lang="ko-KR";u.rate=rate;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ══════════════════════════════════════════
   4. 시범 스틱피겨 렌더 (뷰어 로직 이식)
   ══════════════════════════════════════════ */
const DIM={torso:70,neck:9,headR:15,uarm:36,farm:33,thigh:44,shin:40};
const rad=d=>d*Math.PI/180;
function figColor(c){return c==="coral"?"#FF7A59":c==="mint"?"#37C9A8":"#FF7A59";}

function drawFig(ctx,pose,rootX,ground,color){
  ctx.save();
  const rot=pose.rot||0;
  if(rot){ctx.translate(rootX,ground);ctx.rotate(rad(rot));ctx.translate(-rootX,-ground);}
  const rx=rootX,ry=ground-pose.rootH;
  const P=(x,y,a,l)=>[x+Math.sin(rad(a))*l,y+Math.cos(rad(a))*l];
  const tx=rx+Math.sin(rad(pose.torso))*DIM.torso, ty=ry-Math.cos(rad(pose.torso))*DIM.torso;
  const hd=DIM.neck+DIM.headR+(pose.headUp||0);
  const hx=tx+Math.sin(rad(pose.torso+pose.head))*hd, hy=ty-Math.cos(rad(pose.torso+pose.head))*hd;
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=9;ctx.lineCap="round";ctx.lineJoin="round";
  [pose.lL,pose.lR].forEach(leg=>{const[k1,k2]=leg;const kn=P(rx,ry,k1,DIM.thigh),an=P(kn[0],kn[1],k2,DIM.shin);
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(kn[0],kn[1]);ctx.lineTo(an[0],an[1]);ctx.stroke();});
  ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(tx,ty);ctx.stroke();
  [pose.aL,pose.aR].forEach(arm=>{const[a1,a2]=arm;const el=P(tx,ty,a1,DIM.uarm),wr=P(el[0],el[1],a2,DIM.farm);
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(el[0],el[1]);ctx.lineTo(wr[0],wr[1]);ctx.stroke();});
  ctx.beginPath();ctx.arc(hx,hy,DIM.headR,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function lerp(a,b,t){return a+(b-a)*t;}
function lerpPose(a,b,t){const o={};["rootH","torso","head","headUp","rot"].forEach(k=>o[k]=lerp(a[k]||0,b[k]||0,t));
  ["aL","aR","lL","lR"].forEach(k=>o[k]=[lerp(a[k][0],b[k][0],t),lerp(a[k][1],b[k][1],t)]);return o;}
const ease=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

let demoAnim=null;
function playDemo(letter){
  const dctx=demoCanvas.getContext("2d");
  const W=demoCanvas.width,H=demoCanvas.height,ground=H-30;
  const def=LETTERS[letter];
  if(demoAnim)cancelAnimationFrame(demoAnim);
  const t0=performance.now(),DUR=1500;
  function frame(now){
    let t=(now-t0)/DUR;if(t>1)t=1;const e=ease(t);
    dctx.clearRect(0,0,W,H);
    if(def.mode==="duo"){
      def.figs.forEach(f=>drawFig(dctx,lerpPose(BASE_FIG,{...BASE_FIG,...f.fig},e),W/2+f.x*0.9,ground,figColor(f.c)));
    }else{
      drawFig(dctx,lerpPose(BASE_FIG,{...BASE_FIG,...def.fig},e),W/2,ground,"#FFC93C");
    }
    if(t<1)demoAnim=requestAnimationFrame(frame);
    else{ demoAnim=requestAnimationFrame(()=>{setTimeout(()=>playDemo(letter),700);}); }
  }
  demoAnim=requestAnimationFrame(frame);
}

/* ══════════════════════════════════════════
   5. 포즈 판정 (실제 카메라)
   관절 각도만 사용 → 몸집 무관. 각 check의 k별 계산.
   ══════════════════════════════════════════ */
function ang(ax,ay,bx,by){ // 벡터 b-a 가 수직(위)기준 시계각? 여기선 팔 벌림용: 몸통 대비
  return Math.atan2(bx-ax,-(by-ay))*180/Math.PI; // 위=0, 오른쪽+90
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

// 한 사람(landmarks 33)에 대해 각 check 통과율(0~1) 평균 반환
function scorePerson(lm,checks){
  if(!lm)return 0;
  let sum=0,cnt=0;
  const torsoLen=(dist(lm[11],lm[23])+dist(lm[12],lm[24]))/2 || 0.1;
  for(const c of checks){
    let pass=0;
    if(c.k==="armR"){ // 오른팔(인물기준 오른쪽=lm 12,14,16) 벌림각(몸통 대비)
      const a=ang(lm[12].x,lm[12].y,lm[16].x,lm[16].y); // 어깨→손목
      pass=within(Math.abs(a),c.t,c.tol);
    }else if(c.k==="armL"){
      const a=ang(lm[11].x,lm[11].y,lm[15].x,lm[15].y);
      pass=within(Math.abs(a),c.t,c.tol);
    }else if(c.k==="legGap"){
      const gap=dist(lm[27],lm[28])/torsoLen*30; // 발목 간격 정규화
      pass=within(gap,c.t,c.tol);
    }else if(c.k==="bend"){ // 상체 숙임: 어깨가 골반보다 앞/아래로
      const sh=(lm[11].y+lm[12].y)/2, hip=(lm[23].y+lm[24].y)/2;
      const horiz=Math.abs((lm[11].x+lm[12].x)/2-(lm[23].x+lm[24].x)/2)/torsoLen;
      pass=(sh>hip-0.05 && horiz>0.25)?1:0; // 어깨 내려오고 몸통 기울어짐
    }else if(c.k==="sit"){ // 앉기: 골반이 무릎높이 근처, 무릎 앞으로
      const hip=(lm[23].y+lm[24].y)/2, kn=(lm[25].y+lm[26].y)/2, an=(lm[27].y+lm[28].y)/2;
      pass=(Math.abs(hip-kn)<0.18 && kn<an+0.05)?1:0;
    }else if(c.k==="lie"){ // 눕기: 어깨-골반이 수평
      const dx=Math.abs((lm[11].x+lm[12].x)/2-(lm[23].x+lm[24].x)/2);
      const dy=Math.abs((lm[11].y+lm[12].y)/2-(lm[23].y+lm[24].y)/2);
      pass=(dx>dy*1.3)?1:0;
    }else if(c.k==="armRound"){ // 팔로 원: 양 손목이 머리 위 근처에서 가까움
      const wristClose=dist(lm[15],lm[16])<torsoLen*0.9;
      const up=(lm[15].y<lm[11].y && lm[16].y<lm[12].y);
      pass=(wristClose&&up)?1:0;
    }
    sum+=pass;cnt++;
  }
  return cnt?sum/cnt:0;
}
function within(v,t,tol){ const d=Math.abs(v-t); return d<=tol?1:Math.max(0,1-(d-tol)/(tol*1.5)); }

/* ══════════════════════════════════════════
   6. 게임 상태 & 루프
   ══════════════════════════════════════════ */
const video=document.getElementById("video");
const poseCanvas=document.getElementById("poseCanvas");
const pctx=poseCanvas.getContext("2d");
const demoCanvas=document.getElementById("demoCanvas");

let landmarker=null, camStream=null, rafId=null, lastVideoTime=-1;
let mode="solo", queue=[], qIndex=0, currentLetter=null;
let holdStart=0, combo=0, poseReady=false, roundStartTime=0, waiting=false;

const CONN=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],
  [23,25],[25,27],[24,26],[26,28],[27,29],[29,31],[28,30],[30,32],[0,11],[0,12]];

async function ensureCameraAndModel(){
  if(landmarker&&camStream)return true;
  loading.style.display="flex";errText.style.display="none";
  try{
    if(!camStream){
      loadingText.textContent="카메라 준비 중…";
      camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:1280},height:{ideal:720}},audio:false});
      video.srcObject=camStream;
      await new Promise(r=>{video.onloadedmetadata=()=>{video.play();r();};});
    }
    if(!landmarker){
      loadingText.textContent="준비하고 있어요…";
      const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
      landmarker=await PoseLandmarker.createFromOptions(vision,{
        baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",delegate:"GPU"},
        runningMode:"VIDEO",numPoses:2,
        minPoseDetectionConfidence:0.4,minPosePresenceConfidence:0.4,minTrackingConfidence:0.4});
    }
    speak(""); // 음성 워밍업
    loading.style.display="none";
    return true;
  }catch(e){
    loadingText.textContent="문제가 생겼어요";
    errText.style.display="block";
    errText.innerHTML="카메라를 켤 수 없어요.<br>· 인터넷 주소(https)로 열었는지 확인해주세요<br>· 브라우저에서 카메라를 허용해주세요<br><br>"+e.message;
    return false;
  }
}

function resizeCanvas(){poseCanvas.width=video.videoWidth;poseCanvas.height=video.videoHeight;}

function loop(){
  rafId=requestAnimationFrame(loop);
  if(!landmarker||waiting)return;
  if(video.videoWidth&&poseCanvas.width!==video.videoWidth)resizeCanvas();
  const now=performance.now();
  if(video.currentTime===lastVideoTime)return;
  lastVideoTime=video.currentTime;
  const res=landmarker.detectForVideo(video,now);
  const people=res.landmarks||[];
  drawSkeleton(people);
  judge(people);
}

function drawSkeleton(people){
  pctx.clearRect(0,0,poseCanvas.width,poseCanvas.height);
  const W=poseCanvas.width,H=poseCanvas.height;
  people.forEach((lm,idx)=>{
    const color=idx===0?"#FF7A59":"#37C9A8";
    pctx.strokeStyle=color;pctx.lineWidth=6;pctx.lineCap="round";
    CONN.forEach(([a,b])=>{if(lm[a]&&lm[b]){pctx.beginPath();
      pctx.moveTo(lm[a].x*W,lm[a].y*H);pctx.lineTo(lm[b].x*W,lm[b].y*H);pctx.stroke();}});
    pctx.fillStyle=color;
    lm.forEach(p=>{pctx.beginPath();pctx.arc(p.x*W,p.y*H,5,0,Math.PI*2);pctx.fill();});
  });
}

function judge(people){
  const def=LETTERS[currentLetter];
  let score=0, need=2;
  if(def.mode==="solo"){
    need=1;
    if(people.length<1){ setStatus("온몸이 보이게 서주세요 🧍"); resetHold(); return; }
    score=scorePerson(people[0],def.checks);
  }else{
    if(people.length<2){ setStatus("두 사람이 나란히 서주세요 👨‍👧"); resetHold(); return; }
    hideStatus();
    // 좌우 위치로 아빠(왼)/아이(오른) 구분: 화면상 x가 작은 쪽이 왼쪽
    let a=people[0],b=people[1];
    const ax=(a[23].x+a[24].x)/2, bx=(b[23].x+b[24].x)/2;
    // 거울 화면이므로 실제 왼쪽=x큰 쪽. duoChecks p0=아빠(왼). 간단히 두 배정 모두 시도해 높은 쪽 채택.
    const s1=(scorePerson(a,def.duoChecks.p0)+scorePerson(b,def.duoChecks.p1))/2;
    const s2=(scorePerson(b,def.duoChecks.p0)+scorePerson(a,def.duoChecks.p1))/2;
    score=Math.max(s1,s2);
  }
  updateGauge(score);
  const THRESH=0.75;
  if(score>=THRESH){
    if(!holdStart)holdStart=performance.now();
    const held=(performance.now()-holdStart)/1000;
    gaugeLabel.textContent=`좋아요! ${Math.max(0,(1.5-held)).toFixed(1)}초…`;
    if(held>=1.5){ success(); }
  }else{
    resetHold();
  }
}
function resetHold(){holdStart=0;}
function updateGauge(score){
  gaugeFill.style.width=Math.min(100,score*100)+"%";
  if(score<0.4)gaugeLabel.textContent="몸을 움직여봐요";
  else if(score<0.75)gaugeLabel.textContent="비슷해지고 있어요…";
}
let statusTimer=null;
function setStatus(t){statusChip.textContent=t;statusChip.style.display="block";}
function hideStatus(){statusChip.style.display="none";}

/* 성공 처리 */
function success(){
  waiting=true; resetHold();
  const def=LETTERS[currentLetter];
  const elapsed=(performance.now()-roundStartTime)/1000;
  combo++;
  // 별: 포즈 성공 기본 2 + 빠르면 3
  let stars=elapsed<8?3:2;
  store.setStar(currentLetter,stars);
  // 발음 유도 (보너스 별, 관대)
  showWin(currentLetter,def,stars,elapsed);
}

/* ══════════════════════════════════════════
   7. 화면 전환 & UI
   ══════════════════════════════════════════ */
const screens={title:titleScreen,map:mapScreen,play:playScreen};
function show(name){Object.values(screens).forEach(s=>s.classList.remove("active"));screens[name].classList.add("active");}

// 타이틀 → 지도
document.querySelectorAll(".big-start").forEach(b=>{
  b.addEventListener("click",()=>{ mode=b.dataset.mode; buildMap(); show("map"); });
});
mapBack.addEventListener("click",()=>show("title"));

function buildMap(){
  totalStars.textContent=store.total();
  mapScroll.innerHTML="";
  const stages = mode==="solo" ? STAGES.filter(s=>s.mode==="solo") : STAGES;
  stages.forEach((st,si)=>{
    const g=document.createElement("div");g.className="stage-group";
    g.innerHTML=`<div class="stage-label"><span class="badge">${st.badge}</span>${st.label}</div>`;
    const tiles=document.createElement("div");tiles.className="tiles";
    // 잠금: 이전 스테이지 별 절반 이상이면 해제(간단 규칙). 첫 스테이지는 항상 열림.
    let prevCleared = si===0 ? true : stages[si-1].list.some(g=>store.starOf(g)>0);
    st.list.forEach(letter=>{
      const t=document.createElement("button");
      const stars=store.starOf(letter);
      t.className="tile"+(st.mode==="duo"?" duo":"")+(stars>0?" cleared":"")+(prevCleared?"":" locked");
      t.innerHTML=`<span>${letter}</span>`+(stars>0?`<span class="ministar">${"★".repeat(stars)}</span>`:"");
      if(prevCleared) t.addEventListener("click",()=>startStage(st,letter));
      tiles.appendChild(t);
    });
    g.appendChild(tiles);mapScroll.appendChild(g);
  });
}

async function startStage(stage,startLetter){
  queue=stage.list.slice();
  qIndex=Math.max(0,queue.indexOf(startLetter));
  combo=0;
  show("play");
  const ok=await ensureCameraAndModel();
  if(!ok)return;
  cancelAnimationFrame(rafId);loop();
  loadLetter();
}

function loadLetter(){
  currentLetter=queue[qIndex];
  const def=LETTERS[currentLetter];
  targetGlyph.textContent=currentLetter;
  playHint.textContent=def.cap;
  comboBox.style.display=combo>0?"block":"none";comboNum.textContent=combo;
  gaugeWrap.style.display="none";
  winOverlay.style.display="none";
  waiting=true; // 시범 보는 동안 판정 정지
  // 시범
  demoSpeak.textContent=def.sound;
  demoText.textContent=def.cap;
  demoOverlay.style.display="flex";
  playDemo(currentLetter);
  speak(currentLetter+". "+def.sound,0.9);
}

demoBtn.addEventListener("click",()=>{
  demoOverlay.style.display="none";
  if(demoAnim)cancelAnimationFrame(demoAnim);
  gaugeWrap.style.display="block";
  roundStartTime=performance.now();
  waiting=false;
});
demoAgainBtn.addEventListener("click",()=>{ waiting=true;demoOverlay.style.display="flex";playDemo(currentLetter);speak(LETTERS[currentLetter].sound); });
skipBtn.addEventListener("click",nextLetter);
playBack.addEventListener("click",()=>{ waiting=true;cancelAnimationFrame(rafId);show("map");buildMap(); });

function showWin(letter,def,stars,elapsed){
  winGlyph.textContent=letter;
  winSpeak.textContent=def.sound;
  winStars.innerHTML="";
  for(let i=0;i<stars;i++){const s=document.createElement("span");s.textContent="⭐";s.style.animationDelay=(i*0.15)+"s";winStars.appendChild(s);}
  // 자기경쟁 기록
  if(combo>store.data.best.combo){ store.data.best.combo=combo;store.save();
    winRecord.textContent=`🔥 신기록! ${combo}연속 성공!`; winRecord.style.display="block";
  }else winRecord.style.display="none";
  winOverlay.style.display="flex";
  spawnConfetti();
  // 성공 소리 → 발음 유도
  speak("잘했어요! "+letter,1);
  setTimeout(()=>speak("같이 말해볼까요? "+def.sound,0.9),1200);
}
winNext.addEventListener("click",nextLetter);

function nextLetter(){
  winOverlay.style.display="none";
  qIndex++;
  if(qIndex>=queue.length){
    // 스테이지 끝
    waiting=true;cancelAnimationFrame(rafId);
    speak("모두 완성했어요! 대단해요!",1);
    show("map");buildMap();
    return;
  }
  waiting=false;
  loadLetter();
}

function spawnConfetti(){
  const emojis=["⭐","🎉","✨","🌟","💫"];
  for(let i=0;i<24;i++){
    const c=document.createElement("div");c.className="confetti";
    c.textContent=emojis[i%emojis.length];
    c.style.left=Math.random()*100+"%";
    c.style.animationDuration=(1.5+Math.random()*1.5)+"s";
    c.style.animationDelay=(Math.random()*0.4)+"s";
    winOverlay.appendChild(c);
    setTimeout(()=>c.remove(),3200);
  }
}

// 정리
window.addEventListener("pagehide",()=>{ if(camStream)camStream.getTracks().forEach(t=>t.stop()); });
</script>
